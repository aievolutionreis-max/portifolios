<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Tenor+Sans&family=Montserrat:wght@200;300;400;500&display=swap"
        rel="stylesheet" />
    <title>Portfólios de Design - Reis Automação</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: "#06302a",
                        gold: "#c5a059",
                        onyx: "#0a0a0a",
                        pearl: "#fdfcf8"
                    },
                    fontFamily: {
                        serif: ["Playfair Display", "serif"],
                        display: ["Tenor Sans", "sans-serif"],
                        sans: ["Montserrat", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-onyx text-pearl font-sans overflow-x-hidden relative; }
        }
        .portfolio-card {
            @apply relative overflow-hidden transition-all duration-700 ease-out border border-white/5 bg-onyx;
        }
        .portfolio-card:hover { 
            @apply border-gold/40 shadow-[0_0_40px_rgba(197,160,89,0.15)] z-10; 
            transform: translateY(-4px) scale(1.02);
        }
        .gradient-dark { @apply absolute inset-0 bg-gradient-to-t from-onyx via-transparent to-transparent opacity-90 transition-opacity duration-700; }
        .group:hover .gradient-dark { @apply opacity-70; }
    </style>
</head>

<body class="min-h-screen flex flex-col relative">
    <main class="my-auto w-full flex flex-col items-center p-6 md:p-12 lg:p-16 z-10">
        <div class="text-center mb-12 md:mb-20 animate-[fadeIn_1s_ease-out]">
            <span
                class="text-gold text-[10px] md:text-xs uppercase tracking-[0.4em] md:tracking-[0.5em] mb-4 block opacity-80">Selecione
                sua Experiência</span>
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-display uppercase tracking-[0.15em] mb-6 drop-shadow-lg">
                Portfólios</h1>
            <div class="h-px w-16 md:w-24 bg-gold mx-auto opacity-40"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 w-full max-w-[90rem]">
            <!-- Grey Portfolio -->
            <a href="screens/screen1.html" class="portfolio-card group rounded-sm"
                style="animation: fadeInUp 0.8s ease-out 0.1s both;">
                <div class="aspect-[3/4] overflow-hidden relative">
                    <img src="screens/screen1.png" alt="Grey Edition"
                        class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-[1.5s] ease-out brightness-90 group-hover:brightness-100"
                        loading="lazy" />
                    <div class="gradient-dark"></div>
                </div>
                <div class="absolute bottom-6 left-6 md:bottom-8 md:left-8 z-20">
                    <p
                        class="text-[9px] md:text-[10px] text-gold uppercase tracking-widest mb-1.5 opacity-80 group-hover:opacity-100 transition-opacity">
                        Curation I</p>
                    <h2
                        class="text-xl md:text-2xl font-serif italic text-white/90 group-hover:text-white transition-colors duration-500">
                        Grey Edition</h2>
                </div>
            </a>

            <!-- Grey2 Portfolio -->
            <a href="screens/screen2.html" class="portfolio-card group rounded-sm lg:mt-16"
                style="animation: fadeInUp 0.8s ease-out 0.2s both;">
                <div class="aspect-[3/4] overflow-hidden relative">
                    <img src="screens/screen2.png" alt="Grey Duo"
                        class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-[1.5s] ease-out brightness-90 group-hover:brightness-100"
                        loading="lazy" />
                    <div class="gradient-dark"></div>
                </div>
                <div class="absolute bottom-6 left-6 md:bottom-8 md:left-8 z-20">
                    <p
                        class="text-[9px] md:text-[10px] text-gold uppercase tracking-widest mb-1.5 opacity-80 group-hover:opacity-100 transition-opacity">
                        Curation II</p>
                    <h2
                        class="text-xl md:text-2xl font-serif italic text-white/90 group-hover:text-white transition-colors duration-500">
                        Grey Duo</h2>
                </div>
            </a>

            <!-- Natural Portfolio -->
            <a href="screens/screen3.html" class="portfolio-card group rounded-sm"
                style="animation: fadeInUp 0.8s ease-out 0.3s both;">
                <div class="aspect-[3/4] overflow-hidden relative">
                    <img src="screens/screen3.png" alt="Natural Essence"
                        class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-[1.5s] ease-out brightness-90 group-hover:brightness-100"
                        loading="lazy" />
                    <div class="gradient-dark"></div>
                </div>
                <div class="absolute bottom-6 left-6 md:bottom-8 md:left-8 z-20">
                    <p
                        class="text-[9px] md:text-[10px] text-gold uppercase tracking-widest mb-1.5 opacity-80 group-hover:opacity-100 transition-opacity">
                        Curation III</p>
                    <h2
                        class="text-xl md:text-2xl font-serif italic text-white/90 group-hover:text-white transition-colors duration-500">
                        Natural Essence</h2>
                </div>
            </a>

            <!-- Rosé Portfolio -->
            <a href="screens/screen4.html" class="portfolio-card group rounded-sm lg:mt-16"
                style="animation: fadeInUp 0.8s ease-out 0.4s both;">
                <div class="aspect-[3/4] overflow-hidden relative">
                    <img src="screens/screen4.png" alt="Rosé Palette"
                        class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-[1.5s] ease-out brightness-90 group-hover:brightness-100"
                        loading="lazy" />
                    <div class="gradient-dark"></div>
                </div>
                <div class="absolute bottom-6 left-6 md:bottom-8 md:left-8 z-20">
                    <p
                        class="text-[9px] md:text-[10px] text-gold uppercase tracking-widest mb-1.5 opacity-80 group-hover:opacity-100 transition-opacity">
                        Curation IV</p>
                    <h2
                        class="text-xl md:text-2xl font-serif italic text-white/90 group-hover:text-white transition-colors duration-500">
                        Rosé Palette</h2>
                </div>
            </a>
        </div>
    </main>

    <footer
        class="w-full py-8 text-center text-[9px] md:text-[10px] uppercase tracking-[0.25em] md:tracking-[0.4em] text-white/30 z-10 transition-colors hover:text-white/50">
        © 2026 Portfólios de Design • Reis Automação estética e design
    </footer>

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
