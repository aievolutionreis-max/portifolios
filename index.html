<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Tenor+Sans&family=Montserrat:wght@200;300;400;500&display=swap"
        rel="stylesheet" />
    <title>Essence Clinic - Portfólios de Design</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: "#06302a",
                        gold: "#c5a059",
                        onyx: "#0a0a0a",
                        pearl: "#fdfcf8"
                    },
                    fontFamily: {
                        serif: ["Playfair Display", "serif"],
                        display: ["Tenor Sans", "sans-serif"],
                        sans: ["Montserrat", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-onyx text-pearl font-sans overflow-hidden; }
        }
        .portfolio-card {
            @apply relative overflow-hidden transition-all duration-700 ease-in-out border border-white/5;
        }
        .portfolio-card:hover { @apply border-gold/50 scale-[1.02]; }
        .gradient-dark { @apply absolute inset-0 bg-gradient-to-t from-onyx via-transparent to-transparent opacity-90; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-8 md:p-16">
    <div class="text-center mb-16">
        <span class="text-gold text-xs uppercase tracking-[0.5em] mb-4 block">Selecione sua Experiência</span>
        <h1 class="text-5xl md:text-7xl font-display uppercase tracking-[0.2em] mb-4">Essence</h1>
        <div class="h-px w-24 bg-gold mx-auto opacity-50"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 w-full max-w-7xl">
        <!-- Grey Portfolio -->
        <a href="screens/essence-grey.html" class="portfolio-card group">
            <div class="aspect-[3/4] bg-emerald/20 overflow-hidden">
                <img src="screens/screen1.png" alt="Grey Edition"
                    class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                <div class="gradient-dark"></div>
            </div>
            <div class="absolute bottom-8 left-8">
                <p class="text-[10px] text-gold uppercase tracking-widest mb-1">Curation I</p>
                <h2 class="text-2xl font-serif italic">Grey Edition</h2>
            </div>
        </a>

        <!-- Grey2 Portfolio -->
        <a href="screens/essence-grey2.html" class="portfolio-card group lg:mt-12">
            <div class="aspect-[3/4] bg-emerald/20 overflow-hidden">
                <img src="screens/screen2.png" alt="Grey Duo"
                    class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                <div class="gradient-dark"></div>
            </div>
            <div class="absolute bottom-8 left-8">
                <p class="text-[10px] text-gold uppercase tracking-widest mb-1">Curation II</p>
                <h2 class="text-2xl font-serif italic">Grey Duo</h2>
            </div>
        </a>

        <!-- Natural Portfolio -->
        <a href="screens/essence-natural.html" class="portfolio-card group">
            <div class="aspect-[3/4] bg-emerald/20 overflow-hidden">
                <img src="screens/screen3.png" alt="Natural Essence"
                    class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                <div class="gradient-dark"></div>
            </div>
            <div class="absolute bottom-8 left-8">
                <p class="text-[10px] text-gold uppercase tracking-widest mb-1">Curation III</p>
                <h2 class="text-2xl font-serif italic">Natural Essence</h2>
            </div>
        </a>

        <!-- Rosé Portfolio -->
        <a href="screens/essence-rose.html" class="portfolio-card group lg:mt-12">
            <div class="aspect-[3/4] bg-emerald/20 overflow-hidden">
                <img src="screens/screen4.png" alt="Rosé Palette"
                    class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                <div class="gradient-dark"></div>
            </div>
            <div class="absolute bottom-8 left-8">
                <p class="text-[10px] text-gold uppercase tracking-widest mb-1">Curation IV</p>
                <h2 class="text-2xl font-serif italic">Rosé Palette</h2>
            </div>
        </a>
    </div>

    <footer class="mt-20 text-[10px] uppercase tracking-[0.4em] text-white/20">
        © 2026 Essence Clínica Médica • Alta Estética & Arte
    </footer>
</body>

</html>
